<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width,
                   initial-scale=1.0">
    <title>FitCare — Roadmap</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .fc-timeline {
            position: relative;
            padding-left: 48px;
        }
        .fc-timeline::before {
            content: '';
            position: absolute;
            left: 16px; top: 0; bottom: 0;
            width: 2px;
            background: var(--border);
        }
        .fc-phase-item {
            position: relative;
            margin-bottom: 20px;
        }
        .fc-timeline-dot {
            position: absolute;
            left: -40px; top: 24px;
            width: 32px; height: 32px;
            border-radius: 50%;
            background: var(--bg-input);
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            z-index: 1;
        }
        .fc-timeline-dot.current {
            background: var(--accent);
            border-color: var(--accent);
            color: #0f1117;
            box-shadow: 0 0 0 4px
                var(--accent-soft);
        }
        .fc-timeline-dot.completed {
            background: var(--info);
            border-color: var(--info);
            color: #fff;
        }
    </style>
</head>
<body>

<nav class="fc-navbar d-flex align-items-center
            justify-content-between">
    <a class="fc-brand" href="dashboard.html">
        Fit<span>Care</span>
    </a>
    <ul class="d-flex mb-0 list-unstyled gap-1">
        <li>
            <a href="dashboard.html"
               class="nav-link-fc">
                <i class="bi bi-grid"></i>
                Dashboard
            </a>
        </li>
        <li>
            <a href="roadmap.html"
               class="nav-link-fc active">
                <i class="bi bi-map"></i>
                Roadmap
            </a>
        </li>
    </ul>
    <div class="d-flex align-items-center gap-3">
        <span style="color:var(--text-muted);
                     font-size:14px;"
              id="navUserName"></span>
        <div class="fc-avatar"
             id="navAvatar"
             onclick="logout()">U</div>
    </div>
</nav>

<div class="fc-main">

    <div class="d-flex justify-content-between
                align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-1">
                My Roadmap 🗺️
            </h4>
            <p style="color:var(--text-muted);
                      font-size:14px;"
               id="rmSubtitle">
                Loading...
            </p>
        </div>
        <a href="dashboard.html"
           class="btn-fc-outline">
            <i class="bi bi-arrow-left"></i>
            Dashboard
        </a>
    </div>

    <!-- Loading -->
    <div id="rmLoading"
         class="text-center py-5">
        <div class="spinner-border"
             style="color:var(--accent);
                    width:48px;height:48px;">
        </div>
        <p class="mt-3"
           style="color:var(--text-muted);">
            Building your roadmap...
        </p>
    </div>

    <!-- Content -->
    <div id="rmContent" style="display:none;">

        <!-- Overview -->
        <div class="fc-card mb-4"
             id="rmOverview">
        </div>

        <!-- Progress Bar -->
        <div class="fc-card mb-4">
            <div class="d-flex
                        justify-content-between
                        align-items-center mb-3">
                <div class="fc-card-title mb-0">
                    <i class="bi bi-graph-up"></i>
                    Overall Progress
                </div>
                <span style="font-size:14px;
                             font-weight:700;
                             color:var(--accent);"
                      id="rmPct">0%</span>
            </div>
            <div class="fc-progress">
                <div class="fc-progress-bar"
                     id="rmBar"
                     style="width:0%">
                </div>
            </div>
            <div class="d-flex
                        justify-content-between
                        mt-2">
                <span style="font-size:12px;
                             color:var(
                             --text-muted);"
                      id="rmWeekInfo">
                </span>
                <span style="font-size:12px;
                             color:var(
                             --text-muted);"
                      id="rmDateInfo">
                </span>
            </div>
        </div>

        <!-- Phases Timeline -->
        <div class="fc-card">
            <div class="fc-card-title">
                <i class="bi bi-signpost-split"></i>
                Your Journey Phases
            </div>
            <div class="fc-timeline"
                 id="rmPhases">
            </div>
        </div>

    </div>

    <!-- No Goal -->
    <div id="rmNoGoal" style="display:none;">
        <div class="fc-card text-center py-5">
            <div style="font-size:60px;
                        margin-bottom:16px;">
                🎯
            </div>
            <h5 class="fw-bold mb-2">
                No Goal Set Yet
            </h5>
            <p style="color:var(--text-muted);
                      margin-bottom:24px;">
                Set a fitness goal to see
                your roadmap
            </p>
            <a href="goal-select.html"
               class="btn-fc">
                <i class="bi bi-bullseye"></i>
                Choose My Goal
            </a>
        </div>
    </div>

</div>

<div class="fc-toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
    requireAuth();

    document.addEventListener(
        'DOMContentLoaded', async () => {
            loadNavbar();
            await loadRoadmap();
        });

    async function loadRoadmap() {
        const [rmRes, goalRes] =
            await Promise.all([
                apiGetMyRoadmap(),
                apiGetMyGoal()
            ]);

        document.getElementById('rmLoading')
            .style.display = 'none';

        if (!goalRes?.data?.success) {
            document.getElementById('rmNoGoal')
                .style.display = 'block';
            return;
        }

        if (!rmRes?.data?.success) {
            document.getElementById('rmContent')
                .style.display = 'block';
            document.getElementById('rmPhases')
                .innerHTML = errorHTML(
                    'Roadmap not available '
                    + 'for this goal yet.');
            return;
        }

        const rm   = rmRes.data.data;
        const goal = goalRes.data.data;

        document.getElementById('rmContent')
            .style.display = 'block';

        // Subtitle
        document.getElementById('rmSubtitle')
            .textContent =
                `${rm.title} — `
                + `${rm.totalWeeks} weeks`;

        // Overview card
        document.getElementById('rmOverview')
            .innerHTML = `
            <div class="d-flex
                        align-items-center
                        gap-3 mb-3">
                <span style="font-size:44px;">
                    ${getGoalIcon(goal.goalType)}
                </span>
                <div>
                    <h5 class="fw-bold mb-1">
                        ${rm.title}
                    </h5>
                    <span class="fc-badge green">
                        Active Goal
                    </span>
                </div>
            </div>
            <p style="color:var(--text-muted);
                      font-size:14px;
                      margin-bottom:12px;">
                ${rm.overview || rm.description}
            </p>
            <div class="fc-tip-card"
                 style="padding:12px 16px;">
                <div style="font-size:13px;
                            color:var(--accent);
                            font-weight:600;">
                    🏆 Expected Results
                </div>
                <div style="font-size:14px;
                            margin-top:4px;">
                    ${rm.expectedResults || ''}
                </div>
            </div>`;

        // Progress
        const pct =
            goal.completionPercentage || 0;
        document.getElementById('rmPct')
            .textContent = `${pct}%`;
        document.getElementById('rmBar')
            .style.width = `${pct}%`;
        document.getElementById('rmWeekInfo')
            .textContent =
                `Week ${goal.currentWeek} `
                + `of ${goal.totalWeeks}`;
        document.getElementById('rmDateInfo')
            .textContent =
                goal.startDate
                ? `Started: ${formatDateDisplay(
                    goal.startDate)}`
                : '';

        // Phases
        renderPhases(rm.phases || [],
            goal.currentWeek);
    }

    function renderPhases(phases, currentWeek) {
        const container =
            document.getElementById('rmPhases');

        if (phases.length === 0) {
            container.innerHTML = emptyHTML(
                'bi-signpost',
                'No phases found', '');
            return;
        }

        container.innerHTML =
            phases.map(phase => {
                const isCurrent =
                    currentWeek >= phase.startWeek
                    && currentWeek <= phase.endWeek;
                const isDone =
                    currentWeek > phase.endWeek;

                const dotClass =
                    isCurrent ? 'current'
                    : isDone ? 'completed' : '';

                const tasks =
                    phase.tasks || [];

                return `
                <div class="fc-phase-item">
                    <div class="fc-phase
                        ${dotClass}">

                        <div class="fc-timeline-dot
                            ${dotClass}">
                            ${isDone
                                ? '✓'
                                : phase.icon
                                || phase.phaseNumber}
                        </div>

                        <div class="fc-phase-header">
                            <div>
                                <div style="
                                    font-weight:700;
                                    font-size:16px;
                                    margin-bottom:4px;">
                                    Phase
                                    ${phase.phaseNumber}:
                                    ${phase.phaseName}
                                </div>
                                <div style="
                                    font-size:13px;
                                    color:var(
                                    --text-muted);">
                                    Week
                                    ${phase.startWeek}
                                    — Week
                                    ${phase.endWeek}
                                    · ${phase.focusArea || ''}
                                </div>
                            </div>
                            ${isCurrent
                                ? '<span class="fc-badge green">Current</span>'
                                : isDone
                                ? '<span class="fc-badge blue">Done ✓</span>'
                                : '<span class="fc-badge" style="background:var(--bg-input);color:var(--text-muted);">Upcoming</span>'}
                        </div>

                        <p style="font-size:14px;
                                  color:var(
                                  --text-muted);
                                  margin-bottom:
                                  12px;">
                            ${phase.phaseDescription
                                || ''}
                        </p>

                        ${phase.milestone ? `
                        <div class="fc-tip-card
                            mb-3"
                             style="padding:
                             10px 14px;">
                            <span style="font-size:
                                         13px;
                                         color:var(
                                         --accent);
                                         font-weight:
                                         600;">
                                🎯 Milestone:
                            </span>
                            <span style="font-size:
                                         14px;">
                                ${phase.milestone}
                            </span>
                        </div>` : ''}

                        ${tasks.length > 0 ? `
                        <div style="margin-top:
                                    10px;">
                            ${tasks.map(t => `
                            <div class="fc-task-item">
                                <div class="fc-task-check
                                    ${isDone
                                    ? 'done' : ''}">
                                    ${isDone
                                        ? '✓' : ''}
                                </div>
                                <div>
                                    <div style="
                                        font-size:
                                        14px;
                                        font-weight:
                                        600;">
                                        ${t.taskName}
                                    </div>
                                    <div style="
                                        font-size:
                                        12px;
                                        color:var(
                                        --text-muted)
                                        ;">
                                        ${t.taskDescription || ''}
                                    </div>
                                </div>
                                ${t.required
                                    ? '<span class="fc-badge blue ms-auto" style="font-size:10px;">Required</span>'
                                    : ''}
                            </div>`).join('')}
                        </div>` : ''}

                    </div>
                </div>`;
            }).join('');
    }
</script>
</body>
</html>
