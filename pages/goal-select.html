<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width,
                   initial-scale=1.0">
    <title>FitCare — Choose Goal</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="fc-navbar d-flex align-items-center
            justify-content-between">
    <a class="fc-brand" href="dashboard.html">
        Fit<span>Care</span>
    </a>
    <div class="d-flex align-items-center gap-3">
        <span style="color:var(--text-muted);
                     font-size:14px;"
              id="navUserName"></span>
        <div class="fc-avatar"
             id="navAvatar"
             onclick="logout()">U</div>
    </div>
</nav>

<div class="fc-main">

    <div class="text-center mb-5">
        <h3 class="fw-bold mb-2">
            Choose Your Fitness Goal 🎯
        </h3>
        <p style="color:var(--text-muted);
                  font-size:15px;">
            We will create a personalized
            roadmap just for you
        </p>
    </div>

    <!-- Loading -->
    <div id="goalsLoading"
         class="text-center py-5">
        <div class="spinner-border"
             style="color:var(--accent);">
        </div>
        <p class="mt-3"
           style="color:var(--text-muted);">
            Loading goals...
        </p>
    </div>

    <!-- Goals Grid -->
    <div id="goalsGrid"
         class="row g-3 mb-4"
         style="display:none;">
    </div>

    <!-- Submit -->
    <div id="submitSection"
         class="text-center"
         style="display:none;">

        <div class="fc-card mb-4"
             style="max-width:500px;
                    margin:0 auto 24px;">
            <div class="fc-card-title">
                <i class="bi bi-clipboard-data"></i>
                Starting Stats
                <span style="font-size:12px;
                             color:var(
                             --text-muted);
                             font-weight:400;">
                    optional
                </span>
            </div>
            <div class="row g-3">
                <div class="col-6">
                    <label class="fc-label">
                        Weight (kg)
                    </label>
                    <input type="number"
                           id="startWeight"
                           class="form-control
                                  fc-input"
                           placeholder="75.0"
                           step="0.1">
                </div>
                <div class="col-6">
                    <label class="fc-label">
                        Body Fat %
                    </label>
                    <input type="number"
                           id="startBodyFat"
                           class="form-control
                                  fc-input"
                           placeholder="20.0"
                           step="0.1">
                </div>
            </div>
        </div>

        <button class="btn-fc px-5 py-3"
                id="setGoalBtn"
                style="font-size:16px;"
                onclick="setMyGoal()">
            <i class="bi bi-rocket-takeoff"></i>
            Start My Journey
        </button>
    </div>

</div>

<div class="fc-toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
    requireAuth();

    let selectedGoal = null;

    document.addEventListener(
        'DOMContentLoaded', async () => {
            loadNavbar();
            await loadGoals();
        });

    async function loadGoals() {
        const result = await apiGetAllGoals();

        document.getElementById('goalsLoading')
            .style.display = 'none';

        if (!result?.data?.success) {
            showToast(
                'Could not load goals', 'error');
            return;
        }

        const grid =
            document.getElementById('goalsGrid');
        grid.style.display = 'flex';
        grid.className = 'row g-3 mb-4';

       // Find this section in loadGoals() and replace
grid.innerHTML = result.data.data
    .map((goal, idx) => `
    <div class="col-6 col-md-4 col-lg-3">
        <div class="fc-goal-card"
             id="goalCard_${idx}"
             onclick="selectGoal(
                 '${goal.goalType}',
                 ${idx})">

            <!-- ✅ Replace emoji with icon -->
            ${getGoalIcon(goal.goalType)}

            <div class="fc-goal-name mt-3">
                ${goal.goalName}
            </div>
            <div class="fc-goal-desc">
                ${goal.goalDescription}
            </div>
            <div class="mt-2">
                <span class="fc-goal-weeks">
                    &#9201; ${goal.totalWeeks}
                    weeks
                </span>
            </div>
            <div class="mt-2">
                ${getDifficultyBadge(
                    goal.difficulty)}
            </div>
        </div>
    </div>`).join('');
    }

    function selectGoal(goalType, idx) {
        selectedGoal = goalType;

        // Reset all cards
        document.querySelectorAll('.fc-goal-card')
            .forEach(c =>
                c.classList.remove('selected'));

        // Highlight selected
        document.getElementById(
            `goalCard_${idx}`)
            .classList.add('selected');

        document.getElementById('submitSection')
            .style.display = 'block';

        setTimeout(() => {
            document.getElementById(
                'submitSection')
                .scrollIntoView({
                    behavior: 'smooth',
                    block: 'center'
                });
        }, 200);
    }

    async function setMyGoal() {
        if (!selectedGoal) {
            showToast(
                'Please select a goal!', 'error');
            return;
        }

        const btn =
            document.getElementById('setGoalBtn');
        setLoading(btn, true);

        const result = await apiSetGoal({
            goalType: selectedGoal,
            startingWeightKg: parseFloat(
                document.getElementById(
                    'startWeight').value) || null,
            startingBodyFat: parseFloat(
                document.getElementById(
                    'startBodyFat').value) || null
        });

        setLoading(btn, false);

        if (result?.data?.success) {
            const user = getUser();
            if (user) {
                user.activeGoal = selectedGoal;
                saveUser(user);
            }
            showToast('Goal set! Let\'s go 🚀');
            setTimeout(() => {
                window.location.href =
                    'dashboard.html';
            }, 800);
        } else {
            showToast(
                result?.data?.message
                || 'Failed to set goal', 'error');
        }
    }
</script>
</body>
</html>
