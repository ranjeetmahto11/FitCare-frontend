<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width,
                   initial-scale=1.0">
    <title>FitCare — Register</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="fc-auth-wrapper">
    <div class="fc-auth-card"
         style="max-width:500px;">

        <div class="fc-auth-logo">
            Fit<span>Care</span>
        </div>
        <p class="fc-auth-tagline">
            Start your fitness journey today 🚀
        </p>

        <div class="fc-alert error"
             id="regAlert">
            <i class="bi bi-exclamation-circle
                       me-2"></i>
            <span id="regAlertMsg"></span>
        </div>

        <form id="registerForm">

            <div class="row g-3 mb-3">
                <div class="col-6">
                    <label class="fc-label">
                        Full Name
                    </label>
                    <input type="text"
                           id="regName"
                           class="form-control
                                  fc-input"
                           placeholder="John Doe"
                           required>
                </div>
                <div class="col-6">
                    <label class="fc-label">
                        Email
                    </label>
                    <input type="email"
                           id="regEmail"
                           class="form-control
                                  fc-input"
                           placeholder="john@gmail.com"
                           required>
                </div>
            </div>

            <div class="mb-3">
                <label class="fc-label">
                    Password
                </label>
                <div class="position-relative">
                    <input type="password"
                           id="regPassword"
                           class="form-control
                                  fc-input"
                           placeholder="Min 6 characters"
                           required minlength="6">
                    <button type="button"
                            class="btn p-0
                                   position-absolute"
                            style="right:12px;
                                   top:50%;
                                   transform:
                                   translateY(-50%);
                                   color:var(
                                   --text-muted);"
                            onclick="togglePassword(
                                'regPassword',
                                this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-6">
                    <label class="fc-label">
                        Gender
                    </label>
                    <select id="regGender"
                            class="form-select
                                   fc-select">
                        <option value="">Select</option>
                        <option value="MALE">Male</option>
                        <option value="FEMALE">Female</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>
                <div class="col-6">
                    <label class="fc-label">
                        Date of Birth
                    </label>
                    <input type="date"
                           id="regDob"
                           class="form-control
                                  fc-input">
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-6">
                    <label class="fc-label">
                        Height (cm)
                    </label>
                    <input type="number"
                           id="regHeight"
                           class="form-control
                                  fc-input"
                           placeholder="175">
                </div>
                <div class="col-6">
                    <label class="fc-label">
                        Weight (kg)
                    </label>
                    <input type="number"
                           id="regWeight"
                           class="form-control
                                  fc-input"
                           placeholder="70">
                </div>
            </div>

            <div class="mb-4">
                <label class="fc-label">
                    Fitness Level
                </label>
                <select id="regLevel"
                        class="form-select
                               fc-select">
                    <option value="BEGINNER">
                        🌱 Beginner
                    </option>
                    <option value="INTERMEDIATE">
                        💪 Intermediate
                    </option>
                    <option value="ADVANCED">
                        🏆 Advanced
                    </option>
                </select>
            </div>

            <button type="submit"
                    class="btn-fc w-100"
                    id="registerBtn">
                <i class="bi bi-person-plus"></i>
                Create Account
            </button>
        </form>

        <hr class="fc-divider">

        <p class="text-center mb-0"
           style="font-size:14px;
                  color:var(--text-muted);">
            Already have an account?
            <a href="login.html"
               style="color:var(--accent);
                      font-weight:600;">
                Login here
            </a>
        </p>
    </div>
</div>

<div class="fc-toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
    redirectIfLoggedIn();

    function showAlert(msg) {
        const el =
            document.getElementById('regAlert');
        document.getElementById('regAlertMsg')
            .textContent = msg;
        el.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.getElementById('registerForm')
        .addEventListener('submit', async e => {
            e.preventDefault();

            const btn = document
                .getElementById('registerBtn');
            document.getElementById('regAlert')
                .style.display = 'none';

            setLoading(btn, true);

            const result = await apiRegister({
                name: document
                    .getElementById('regName').value,
                email: document
                    .getElementById('regEmail').value,
                password: document
                    .getElementById('regPassword').value,
                gender: document
                    .getElementById('regGender').value
                    || null,
                dateOfBirth: document
                    .getElementById('regDob').value
                    || null,
                heightCm: parseFloat(document
                    .getElementById('regHeight').value)
                    || null,
                weightKg: parseFloat(document
                    .getElementById('regWeight').value)
                    || null,
                fitnessLevel: document
                    .getElementById('regLevel').value
            });

            setLoading(btn, false);

            if (result?.data?.success) {
                const d = result.data.data;
                saveToken(d.token);
                saveUser({
                    id:    d.userId,
                    name:  d.name,
                    email: d.email,
                    role:  d.role
                });
                showToast(
                    `Welcome to FitCare, ${d.name}! 🎉`);
                setTimeout(() => {
                    window.location.href =
                        'goal-select.html';
                }, 800);
            } else {
                showAlert(
                    result?.data?.message
                    || 'Registration failed.');
            }
        });
</script>
</body>
</html>
