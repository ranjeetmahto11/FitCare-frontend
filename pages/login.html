<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width,
                   initial-scale=1.0">
    <title>FitCare — Login</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="fc-auth-wrapper">
    <div class="fc-auth-card">

        <div class="fc-auth-logo">
            Fit<span>Care</span>
        </div>
        <p class="fc-auth-tagline">
            Your Personal Fitness Goal App 💪
        </p>

        <div class="fc-alert error"
             id="loginAlert">
            <i class="bi bi-exclamation-circle
                       me-2"></i>
            <span id="loginAlertMsg"></span>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="fc-label">
                    Email Address
                </label>
                <input type="email"
                       id="loginEmail"
                       class="form-control fc-input"
                       placeholder="john@gmail.com"
                       required>
            </div>

            <div class="mb-4">
                <label class="fc-label">
                    Password
                </label>
                <div class="position-relative">
                    <input type="password"
                           id="loginPassword"
                           class="form-control
                                  fc-input"
                           placeholder="Password"
                           required>
                    <button type="button"
                            class="btn p-0
                                   position-absolute"
                            style="right:12px;
                                   top:50%;
                                   transform:
                                   translateY(-50%);
                                   color:var(
                                   --text-muted);"
                            onclick="togglePassword(
                                'loginPassword',
                                this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit"
                    class="btn-fc w-100"
                    id="loginBtn">
                <i class="bi bi-box-arrow-in-right"></i>
                Login
            </button>
        </form>

        <hr class="fc-divider">

        <p class="text-center mb-0"
           style="font-size:14px;
                  color:var(--text-muted);">
            New to FitCare?
            <a href="register.html"
               style="color:var(--accent);
                      font-weight:600;">
                Register here
            </a>
        </p>
    </div>
</div>

<div class="fc-toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
    redirectIfLoggedIn();

    function showAlert(msg) {
        const el =
            document.getElementById('loginAlert');
        document.getElementById('loginAlertMsg')
            .textContent = msg;
        el.style.display = 'block';
    }

    document.getElementById('loginForm')
        .addEventListener('submit', async e => {
            e.preventDefault();

            const btn =
                document.getElementById('loginBtn');
            document.getElementById('loginAlert')
                .style.display = 'none';

            setLoading(btn, true);

            const result = await apiLogin({
                email: document
                    .getElementById('loginEmail')
                    .value,
                password: document
                    .getElementById('loginPassword')
                    .value
            });

            setLoading(btn, false);

            if (result?.data?.success) {
                const d = result.data.data;
                saveToken(d.token);
                saveUser({
                    id:         d.userId,
                    name:       d.name,
                    email:      d.email,
                    role:       d.role,
                    activeGoal: d.activeGoal
                });

                showToast(
                    `Welcome back, ${d.name}! 💪`);

                setTimeout(() => {
                    window.location.href =
                        d.activeGoal
                        ? 'dashboard.html'
                        : 'goal-select.html';
                }, 600);

            } else {
                showAlert(
                    result?.data?.message
                    || 'Invalid email or password');
            }
        });
</script>
</body>
</html>
