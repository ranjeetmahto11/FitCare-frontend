<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FitCare</title>
</head>
<body>
    <script>
        const token =
            localStorage.getItem('fitcare_token');
        if (token) {
            window.location.href =
                'pages/dashboard.html';
        } else {
            window.location.href =
                'pages/login.html';
        }
    </script>
</body>
</html>
